<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- Recommended meta tags -->
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">

        <!-- PyScript CSS -->
        <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
        <!-- This script tag bootstraps PyScript -->
        <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>
        <!-- Bootstrap Setup -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <!-- External CSS -->
        <link rel="stylesheet" type="text/css" href="style.css">

        <title>Seatwork 2</title>

    <body>
        <py-script src="main.py"></py-script>

        <div>
            <h2>Grade 10 Classmates System</h2>
            <p>Enter your name, section, and favorite subject, then click "Add Student", before clicking "Show List"</p>

            <input type="text" id="name" placeholder="Enter name"> <br>
            <input type="text" id="section" placeholder="Enter section"> <br>
            <input type="text" id="subject" placeholder="Enter favorite subject"> <br>
            <button class="btn btn-primary" py-click="add">Add Student</button>
            <button class="btn btn-success" py-click="introduce">Show List</button>
        </div>

        <div id="output"></div>
    </body>
